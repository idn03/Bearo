name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bearo
          POSTGRES_PASSWORD: bearo
          POSTGRES_DB: bearo_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: npx prettier --check "src/**/*.ts"

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://bearo:bearo@localhost:5432/bearo_test

      - name: Unit tests
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://bearo:bearo@localhost:5432/bearo_test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRATION: 15m

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          DATABASE_URL: postgresql://bearo:bearo@localhost:5432/bearo_test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRATION: 15m

      - name: Build
        run: pnpm run build

  frontend:
    name: Frontend — Lint, Typecheck & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: pnpm run build

  frontend-e2e:
    name: Frontend — E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bearo
          POSTGRES_PASSWORD: bearo
          POSTGRES_DB: bearo_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Start backend
      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bearo:bearo@localhost:5432/bearo_test

      - name: Start backend server
        run: pnpm run start &
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bearo:bearo@localhost:5432/bearo_test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRATION: 15m
          PORT: 3001

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3001/api && break
            sleep 1
          done

      # Run Playwright tests
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Run Playwright E2E tests
        run: pnpm run test:e2e
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
